<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaan Racer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:Arial,sans-serif; overflow:hidden; touch-action:none; }
#hud { display:flex; align-items:center; justify-content:space-between; width:420px; max-width:100vw; padding:4px 10px; margin-bottom:4px; }
#score-box { color:#0ea5e9; font-size:20px; font-weight:bold; }
#lives-box { font-size:22px; letter-spacing:3px; }
#hi-box { color:#fbbf24; font-size:14px; font-weight:bold; }
#msg { color:#888; font-size:13px; text-align:center; margin-bottom:6px; }
canvas { border:2px solid #333; display:block; max-width:100vw; max-height:80vh; }
</style>
</head>
<body>
<div id="hud">
  <div id="score-box">SCORE: 0</div>
  <div id="lives-box">❤️❤️❤️</div>
  <div id="hi-box">BEST: 0</div>
</div>
<div id="msg">SPACE to start &nbsp;|&nbsp; ← → to steer</div>
<canvas id="c" width="420" height="560"></canvas>
<audio id="vo" src="welcome.mp3" preload="auto"></audio>
<script src="photos.js"></script>

<script>
'use strict';
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// ---- Persistent high score ----
let hiScore = parseInt(localStorage.getItem('kaanHiScore') || '0', 10);
document.getElementById('hi-box').textContent = 'BEST: ' + hiScore;

// Game state
let state = 'wait'; // wait | play | dead
let score = 0, spd = 4, fr = 0;
let lives = 3;
let obstacles = [], parts = [], coins = [];
let obT = 0, coinT = 0;
let keys = {};
let voPlayed = false;

// Level system
let level = 1, lastLevel = 0;
let levelBanner = '', levelBannerAlpha = 0, levelBannerTimer = 0;

// Invincibility after losing a life
let invincible = 0; // frames

// Road geometry
const RL = 65, RR = 355, RW = 290, LW = RW / 3;

// Player car
const P = { x: W/2, y: H-120, w: 52, h: 96, tx: W/2 };

// Road marks
const marks = Array.from({length:9}, (_,i) => ({ y: i*80 }));

// Speed lines
const speedLines = Array.from({length:18}, () => ({
  x: RL + Math.random() * RW,
  y: Math.random() * H,
  len: 20 + Math.random() * 40,
  spd: 1 + Math.random()
}));

// ---- Audio ----
let audioCtx = null;
function AC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCrash() {
  const ac = AC();
  const buf = ac.createBuffer(1, ac.sampleRate * 0.7, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 0.35);
  const src = ac.createBufferSource(), g = ac.createGain(), f = ac.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 600;
  src.buffer = buf; g.gain.value = 3;
  src.connect(f); f.connect(g); g.connect(ac.destination);
  src.start();
}

function playTone(freq, dur, vol, type) {
  const ac = AC();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.4, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}

function playSqueal() {
  const ac = AC();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(800, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(350, ac.currentTime + 0.12);
  g.gain.setValueAtTime(0.22, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.12);
}

function playJingle() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 0.45), i * 130));
}

function playCoinSound() {
  const ac = AC();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine'; o.frequency.value = 1200;
  o.frequency.exponentialRampToValueAtTime(1800, ac.currentTime + 0.08);
  g.gain.setValueAtTime(0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.15);
}

function playLevelUp() {
  [523, 659, 784, 880, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.12, 0.35, 'sine'), i * 90));
}

function playLifeLost() {
  [400, 300, 200].forEach((f, i) => setTimeout(() => playTone(f, 0.18, 0.4, 'sawtooth'), i * 120));
}

function playGameOver() {
  [300, 250, 200, 150].forEach((f, i) => setTimeout(() => playTone(f, 0.25, 0.5, 'sawtooth'), i * 140));
}

function playVoice() {
  const el = document.getElementById('vo');
  if (!el) return;
  el.volume = 1; el.currentTime = 0;
  el.play().catch(() => {});
}

// ---- Draw Lamborghini-style car ----
function drawCar(x, y, w, h, player, flash) {
  cx.save(); cx.translate(x, y);
  if (flash) cx.globalAlpha = 0.4;
  const body  = player ? '#0ea5e9' : '#dc2626';
  const dark  = player ? '#0369a1' : '#991b1b';
  const light = player ? '#38bdf8' : '#f87171';

  const hw = w/2, hh = h/2;

  // shadow
  cx.fillStyle = 'rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(0, hh-2, hw*0.85, 7, 0, 0, Math.PI*2); cx.fill();

  // === MAIN BODY ===
  cx.fillStyle = body;
  cx.beginPath();
  cx.moveTo(-hw+8,  -hh);
  cx.lineTo( hw-8,  -hh);
  cx.lineTo( hw,    -hh+10);
  cx.lineTo( hw+4,  -hh+h*0.28);
  cx.lineTo( hw+2,   hh-10);
  cx.lineTo( hw-6,   hh);
  cx.lineTo(-hw+6,   hh);
  cx.lineTo(-hw-2,   hh-10);
  cx.lineTo(-hw-4,  -hh+h*0.28);
  cx.lineTo(-hw,    -hh+10);
  cx.closePath(); cx.fill();

  // highlight
  cx.fillStyle = light;
  cx.globalAlpha = flash ? 0.1 : 0.18;
  cx.beginPath();
  cx.moveTo(-hw*0.5, -hh+2); cx.lineTo( hw*0.5, -hh+2);
  cx.lineTo( hw*0.6, -hh+h*0.35); cx.lineTo(-hw*0.6, -hh+h*0.35);
  cx.closePath(); cx.fill();
  cx.globalAlpha = flash ? 0.4 : 1;

  // cabin
  cx.fillStyle = dark;
  cx.beginPath();
  cx.moveTo(-hw*0.55, -hh+h*0.1); cx.lineTo( hw*0.55, -hh+h*0.1);
  cx.lineTo( hw*0.45, -hh+h*0.42); cx.lineTo(-hw*0.45, -hh+h*0.42);
  cx.closePath(); cx.fill();

  // windscreen
  cx.fillStyle = 'rgba(180,240,255,0.6)';
  cx.beginPath();
  cx.moveTo(-hw*0.48, -hh+h*0.11); cx.lineTo( hw*0.48, -hh+h*0.11);
  cx.lineTo( hw*0.38, -hh+h*0.28); cx.lineTo(-hw*0.38, -hh+h*0.28);
  cx.closePath(); cx.fill();

  // rear window
  cx.fillStyle = 'rgba(180,240,255,0.35)';
  cx.beginPath();
  cx.moveTo(-hw*0.4, -hh+h*0.31); cx.lineTo( hw*0.4, -hh+h*0.31);
  cx.lineTo( hw*0.34,-hh+h*0.41); cx.lineTo(-hw*0.34,-hh+h*0.41);
  cx.closePath(); cx.fill();

  // headlights
  cx.fillStyle = '#fef9c3';
  cx.beginPath(); cx.moveTo(-hw+8,-hh); cx.lineTo(-hw*0.3,-hh); cx.lineTo(-hw*0.3,-hh+6); cx.lineTo(-hw+10,-hh+5); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(hw-8,-hh);  cx.lineTo(hw*0.3,-hh);  cx.lineTo(hw*0.3,-hh+6);  cx.lineTo(hw-10,-hh+5);  cx.closePath(); cx.fill();
  cx.strokeStyle = '#fef08a'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(-hw+9,-hh+2); cx.lineTo(-hw*0.32,-hh+2); cx.stroke();
  cx.beginPath(); cx.moveTo(hw-9,-hh+2);  cx.lineTo(hw*0.32,-hh+2);  cx.stroke();

  // taillights
  cx.fillStyle = '#ef4444';
  cx.fillRect(-hw*0.8, hh-5, hw*1.6, 5);
  cx.fillStyle = '#fca5a5';
  cx.fillRect(-hw*0.8, hh-3, hw*1.6, 2);

  // wheels
  const ww = 13, wh = 20;
  const wheelPos = [[-hw-4, -hh+8], [hw-9, -hh+8], [-hw-4, hh-28], [hw-9, hh-28]];
  wheelPos.forEach(([wx,wy]) => {
    cx.fillStyle = '#0f172a';
    cx.beginPath(); cx.roundRect(wx, wy, ww, wh, 3); cx.fill();
    cx.fillStyle = '#cbd5e1';
    cx.beginPath(); cx.arc(wx+ww/2, wy+wh/2, ww*0.35, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#64748b';
    cx.beginPath(); cx.arc(wx+ww/2, wy+wh/2, ww*0.18, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = '#94a3b8'; cx.lineWidth = 1;
    for (let a = 0; a < Math.PI*2; a += Math.PI/3) {
      cx.beginPath();
      cx.moveTo(wx+ww/2, wy+wh/2);
      cx.lineTo(wx+ww/2 + Math.cos(a)*ww*0.33, wy+wh/2 + Math.sin(a)*ww*0.33);
      cx.stroke();
    }
  });

  // side skirts
  cx.fillStyle = dark;
  cx.fillRect(-hw-2, -hh+h*0.55, hw*2+4, 8);

  // KAAN label
  if (player) {
    cx.fillStyle = '#fff';
    cx.font = 'bold ' + Math.floor(w*0.2) + 'px Arial';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.globalAlpha = flash ? 0.5 : 0.9;
    cx.fillText('KAAN', 0, -hh+h*0.51);
    cx.globalAlpha = 1;
  }

  cx.restore();
}

// ---- Draw coin ----
function drawCoin(coin) {
  if (coin.collected) return;
  cx.save();
  cx.translate(coin.x, coin.y);
  // glow
  const grd = cx.createRadialGradient(0,0,2,0,0,14);
  grd.addColorStop(0, 'rgba(251,191,36,0.8)');
  grd.addColorStop(1, 'rgba(251,191,36,0)');
  cx.fillStyle = grd;
  cx.beginPath(); cx.arc(0,0,14,0,Math.PI*2); cx.fill();
  // coin body
  cx.fillStyle = '#fbbf24';
  cx.beginPath(); cx.arc(0,0,9,0,Math.PI*2); cx.fill();
  cx.fillStyle = '#fde68a';
  cx.beginPath(); cx.arc(-2,-2,5,0,Math.PI*2); cx.fill();
  // $ symbol
  cx.fillStyle = '#92400e';
  cx.font = 'bold 10px Arial';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText('$', 0, 1);
  cx.restore();
}

// ---- Coin collection particle ----
function coinPop(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    parts.push({ x, y, vx: Math.cos(a)*3, vy: Math.sin(a)*3, r:3, life:1, col:'#fbbf24' });
  }
}

// ---- Draw road ----
function drawRoad() {
  cx.fillStyle = '#1a1a2e'; cx.fillRect(0, 0, W, H);
  cx.fillStyle = '#1f2937'; cx.fillRect(0, 0, RL, H);
  cx.fillStyle = '#1f2937'; cx.fillRect(RR, 0, W-RR, H);
  cx.fillStyle = '#374151'; cx.fillRect(RL, 0, RW, H);
  for (let i = 0; i < H; i += 40) {
    const alt = Math.floor((i + fr * spd * 0.5) / 40) % 2 === 0;
    cx.fillStyle = alt ? '#ef4444' : '#f9fafb';
    cx.fillRect(RL-18, i, 18, 20);
    cx.fillRect(RR, i, 18, 20);
  }
  cx.strokeStyle = 'rgba(255,255,255,0.5)'; cx.setLineDash([28,22]); cx.lineWidth = 2;
  marks.forEach(m => {
    [RL+LW, RL+LW*2].forEach(lx => {
      cx.beginPath(); cx.moveTo(lx, m.y); cx.lineTo(lx, m.y+55); cx.stroke();
    });
  });
  cx.setLineDash([]);
}

// ---- Speed lines ----
function drawSpeedLines() {
  const intensity = Math.min(1, (spd - 4) / 4);
  if (intensity <= 0) return;
  cx.save();
  cx.globalAlpha = 0.12 + intensity * 0.2;
  cx.strokeStyle = '#fff';
  cx.lineWidth = 1;
  speedLines.forEach(sl => {
    cx.beginPath();
    cx.moveTo(sl.x, sl.y);
    cx.lineTo(sl.x, sl.y + sl.len * intensity);
    cx.stroke();
    sl.y += spd * (1.5 + sl.spd);
    if (sl.y > H + 60) { sl.y = -sl.len; sl.x = RL + Math.random() * RW; }
  });
  cx.restore();
}

// ---- HUD ----
function updateHUD() {
  document.getElementById('score-box').textContent = 'SCORE: ' + score;
  const hearts = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
  document.getElementById('lives-box').textContent = hearts;
  document.getElementById('hi-box').textContent = 'BEST: ' + hiScore;
}

// ---- Input ----
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state !== 'play') startGame();
  }
  if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

let touching = false, touchSide = 0;
document.addEventListener('touchstart', e => {
  e.preventDefault();
  AC().resume();
  touching = true;
  const tx = e.touches[0].clientX;
  touchSide = tx < window.innerWidth / 2 ? -1 : 1;
  if (state !== 'play') { startGame(); return; }
}, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  const tx = e.touches[0].clientX;
  touchSide = tx < window.innerWidth / 2 ? -1 : 1;
}, { passive: false });

document.addEventListener('touchend', e => {
  e.preventDefault();
  touching = false;
}, { passive: false });

// ---- Game control ----
function startGame() {
  AC().resume();
  state = 'play'; score = 0; spd = 4; fr = 0;
  lives = 3; level = 1; lastLevel = 0; invincible = 0;
  obstacles = []; parts = []; coins = [];
  obT = 0; coinT = 0;
  levelBanner = ''; levelBannerAlpha = 0; levelBannerTimer = 0;
  crashPhoto = null; crashPhotoAnim = false; newRecord = false;
  P.x = W/2; P.tx = W/2;
  document.getElementById('msg').textContent = '← → to steer';
  updateHUD();
  playJingle();
  if (!voPlayed) { voPlayed = true; setTimeout(playVoice, 700); }
}

function spawnOb() {
  const lane = Math.floor(Math.random() * 3);
  obstacles.push({ x: RL + lane*LW + LW/2, y: -90, w: 42, h: 76 });
}

function spawnCoin() {
  const lane = Math.floor(Math.random() * 3);
  coins.push({ x: RL + lane*LW + LW/2, y: -30, collected: false });
}

function hit(a, b) {
  return Math.abs(a.x-b.x) < (a.w+b.w)/2 - 8 && Math.abs(a.y-b.y) < (a.h+b.h)/2 - 12;
}

function hitCoin(p, c) {
  return Math.abs(p.x-c.x) < 30 && Math.abs(p.y-c.y) < 40;
}

function boom(x, y) {
  for (let i = 0; i < 40; i++) {
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*7;
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 3+Math.random()*5, life: 1,
      col: ['#9333ea','#f97316','#fbbf24','#fff','#ef4444'][Math.floor(Math.random()*5)] });
  }
}

let newRecord = false;

// Crash photo
let crashPhoto = null, crashPhotoScale = 0, crashPhotoAlpha = 0, crashPhotoAnim = false;
const crashImgs = [];
if (typeof KAAN_PHOTOS !== 'undefined') {
  KAAN_PHOTOS.forEach(src => { const img = new Image(); img.src = src; crashImgs.push(img); });
}

function showCrashPhoto() {
  if (!crashImgs.length) return;
  crashPhoto = crashImgs[Math.floor(Math.random() * crashImgs.length)];
  crashPhotoScale = 0.05; crashPhotoAlpha = 0; crashPhotoAnim = true;
}

function drawCrashPhoto() {
  if (!crashPhoto) return;
  if (crashPhotoAnim) {
    crashPhotoScale = Math.min(1, crashPhotoScale + 0.07);
    crashPhotoAlpha = Math.min(1, crashPhotoAlpha + 0.08);
    if (crashPhotoScale >= 1) crashPhotoAnim = false;
  }
  const size = Math.min(W, H) * 0.7 * crashPhotoScale;
  cx.save();
  cx.globalAlpha = crashPhotoAlpha;
  cx.beginPath(); cx.arc(W/2, H/2 - 30, size/2, 0, Math.PI*2); cx.clip();
  cx.drawImage(crashPhoto, W/2 - size/2, H/2 - 30 - size/2, size, size);
  cx.restore();
  cx.save();
  cx.globalAlpha = crashPhotoAlpha;
  cx.strokeStyle = '#ef4444'; cx.lineWidth = 4;
  cx.beginPath(); cx.arc(W/2, H/2 - 30, size/2 + 2, 0, Math.PI*2); cx.stroke();
  cx.restore();
}

// ---- Level banner ----
function drawLevelBanner() {
  if (!levelBanner || levelBannerAlpha <= 0) return;
  cx.save();
  cx.globalAlpha = levelBannerAlpha;
  cx.fillStyle = '#fbbf24';
  cx.font = 'bold 36px Arial';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.shadowColor = '#f97316'; cx.shadowBlur = 20;
  cx.fillText(levelBanner, W/2, H/2);
  cx.restore();
}

// ---- Main loop ----
let squealCd = 0;

function loop() {
  requestAnimationFrame(loop);
  cx.clearRect(0, 0, W, H);
  drawRoad();
  drawSpeedLines();

  if (state === 'play') {
    fr++; score++;
    spd = 4 + Math.floor(score / 500) * 0.35;
    spd = Math.min(spd, 8);

    // Level up check
    const newLevel = Math.floor(score / 500) + 1;
    if (newLevel > level) {
      level = newLevel;
      levelBanner = 'LEVEL ' + level + ' 🔥';
      levelBannerAlpha = 1;
      levelBannerTimer = 90;
      playLevelUp();
    }
    if (levelBannerTimer > 0) {
      levelBannerTimer--;
      if (levelBannerTimer < 30) levelBannerAlpha = levelBannerTimer / 30;
    }

    // Invincibility countdown
    if (invincible > 0) invincible--;

    updateHUD();

    // scroll marks
    marks.forEach(m => { m.y += spd; if (m.y > H + 80) m.y -= 9 * 80; });

    // steer
    squealCd--;
    const goLeft  = keys['ArrowLeft']  || (touching && touchSide === -1);
    const goRight = keys['ArrowRight'] || (touching && touchSide ===  1);
    if (goLeft)  { P.tx = Math.max(RL+LW/2,  P.tx - spd*0.9); if(squealCd<=0){playSqueal();squealCd=12;} }
    if (goRight) { P.tx = Math.min(RR-LW/2, P.tx + spd*0.9); if(squealCd<=0){playSqueal();squealCd=12;} }
    P.x += (P.tx - P.x) * 0.16;

    // spawn obstacles
    obT++;
    const gap = Math.max(55, 100 - Math.floor(score/400)*5);
    if (obT > gap) { spawnOb(); obT = 0; }

    // spawn coins (every ~120 frames, randomly)
    coinT++;
    if (coinT > 120 + Math.random()*60) { spawnCoin(); coinT = 0; }

    // move obstacles
    obstacles.forEach(o => o.y += spd * 1.25);
    obstacles = obstacles.filter(o => o.y < H + 100);

    // move coins
    coins.forEach(c => c.y += spd * 1.1);
    coins = coins.filter(c => c.y < H + 50 && !c.collected);

    // coin collision
    coins.forEach(c => {
      if (!c.collected && hitCoin(P, c)) {
        c.collected = true;
        score += 50;
        coinPop(c.x, c.y);
        playCoinSound();
      }
    });

    // obstacle collision (only if not invincible)
    if (invincible === 0) {
      for (const o of obstacles) {
        if (hit(P, o)) {
          boom(P.x, P.y);
          lives--;
          updateHUD();
          if (lives <= 0) {
            // Game over
            playCrash(); playGameOver();
            state = 'dead';
            if (score > hiScore) {
              hiScore = score;
              localStorage.setItem('kaanHiScore', hiScore);
              newRecord = true;
            }
            document.getElementById('msg').textContent = 'GAME OVER! SPACE to retry';
            setTimeout(showCrashPhoto, 400);
          } else {
            // Lost a life — brief invincibility
            playCrash(); playLifeLost();
            invincible = 120;
            // Clear nearby obstacles so it's fair
            obstacles = obstacles.filter(ob => ob !== o && Math.abs(ob.y - P.y) > 80);
          }
          break;
        }
      }
    }
  }

  // draw coins
  coins.forEach(c => drawCoin(c));
  // draw obstacles
  obstacles.forEach(o => drawCar(o.x, o.y, o.w, o.h, false, false));
  // draw player (flashing when invincible)
  if (state !== 'dead') {
    const flash = invincible > 0 && Math.floor(invincible / 6) % 2 === 0;
    drawCar(P.x, P.y, P.w, P.h, true, flash);
  }

  // particles
  parts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.025;
    cx.globalAlpha = p.life; cx.fillStyle = p.col;
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2); cx.fill();
  });
  cx.globalAlpha = 1;
  parts = parts.filter(p => p.life > 0);

  // level banner
  drawLevelBanner();

  // overlays
  if (state === 'wait') {
    cx.fillStyle = 'rgba(0,0,0,0.6)'; cx.fillRect(0,0,W,H);
    cx.textAlign = 'center';
    cx.fillStyle = '#0ea5e9'; cx.font = 'bold 40px Arial';
    cx.fillText('KAAN RACER 🏎️', W/2, H/2-55);
    cx.fillStyle = '#fbbf24'; cx.font = '16px Arial';
    cx.fillText('BEST: ' + hiScore, W/2, H/2-22);
    cx.fillStyle = '#fff'; cx.font = '19px Arial';
    cx.fillText('Press SPACE to start', W/2, H/2+10);
    cx.fillStyle = '#9ca3af'; cx.font = '14px Arial';
    cx.fillText('← → keys or tap left/right', W/2, H/2+40);
    cx.fillStyle = '#6b7280'; cx.font = '13px Arial';
    cx.fillText('❤️ 3 lives  •  🪙 coins = +50pts', W/2, H/2+68);
  }

  if (state === 'dead') {
    cx.fillStyle = 'rgba(0,0,0,0.72)'; cx.fillRect(0,0,W,H);
    cx.textAlign = 'center';
    cx.fillStyle = '#ef4444'; cx.font = 'bold 44px Arial';
    cx.fillText('GAME OVER 💥', W/2, 55);
    drawCrashPhoto();
    if (newRecord) {
      cx.fillStyle = '#fbbf24'; cx.font = 'bold 22px Arial';
      cx.fillText('🏆 NEW RECORD! 🏆', W/2, H - 105);
    }
    cx.fillStyle = '#fff'; cx.font = '24px Arial';
    cx.fillText('Score: ' + score, W/2, H - 75);
    cx.fillStyle = '#fbbf24'; cx.font = '16px Arial';
    cx.fillText('Best: ' + hiScore, W/2, H - 50);
    cx.fillStyle = '#0ea5e9'; cx.font = '17px Arial';
    cx.fillText('SPACE or tap to play again', W/2, H - 20);
  }
}

loop();
</script>
</body>
</html>
