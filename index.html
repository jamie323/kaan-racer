<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaan Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
  canvas { border: 2px solid #333; display: block; }
  #ui { color: #fff; text-align: center; margin-bottom: 10px; }
  #score { color: #a855f7; font-size: 22px; font-weight: bold; }
</style>
</head>
<body>
<div id="ui">
  <div id="score">SCORE: 0</div>
  <div id="msg" style="font-size:13px;color:#888;margin-top:4px;">← → to steer &nbsp;|&nbsp; SPACE to start</div>
</div>
<canvas id="c" width="420" height="580"></canvas>
<audio id="welcomeAudio" src="welcome.mp3" preload="auto"></audio>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
let state='waiting',score=0,speed=4,frame=0;
const RL=60,RR=360,RW=300,LW=100;
const car={x:W/2,y:H-130,w:54,h:100,lane:1};
let targetX=car.x,keys={},marks=[],obstacles=[],particles=[],obTimer=0;
for(let i=0;i<8;i++)marks.push({y:i*90});

// ---- AUDIO ----
let AC=null;
function getAC(){if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();}return AC;}
let engineOsc=null,engineGain=null;

function startEngine(){
  if(engineOsc)return;
  engineOsc=getAC().createOscillator();
  engineGain=getAC().createGain();
  const dist=getAC().createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x*(Math.abs(x)+0.3)/(x*x+0.3+1);}
  dist.curve=curve;
  engineOsc.type='sawtooth';
  engineOsc.frequency.value=80;
  engineGain.gain.value=0.4;
  engineOsc.connect(dist);dist.connect(engineGain);engineGain.connect(getAC().destination);
  engineOsc.start();
}

function stopEngine(){
  if(!engineOsc)return;
  engineGain.gain.setTargetAtTime(0,getAC().currentTime,0.1);
  setTimeout(()=>{try{engineOsc.stop();engineOsc=null;}catch(e){}},300);
}

function updateEngine(spd){
  if(!engineOsc)return;
  const freq=70+spd*18;
  engineOsc.frequency.setTargetAtTime(freq,getAC().currentTime,0.1);
}

function playCrash(){
  const buf=AC.createBuffer(1,getAC().sampleRate*0.6,getAC().sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.4);
  const src=getAC().createBufferSource(),g=getAC().createGain();
  const filt=getAC().createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;
  src.buffer=buf;g.gain.value=2.5;
  src.connect(filt);filt.connect(g);g.connect(getAC().destination);
  src.start();
}

function playBeep(freq,dur,vol){
  const o=getAC().createOscillator(),g=getAC().createGain();
  o.frequency.value=freq;o.type='square';
  g.gain.setValueAtTime(vol||0.4,getAC().currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,getAC().currentTime+dur);
  o.connect(g);g.connect(getAC().destination);
  o.start();o.stop(getAC().currentTime+dur);
}

function playNearMiss(){playBeep(300,0.08,0.25);}

function playWelcome(){
  const el=document.getElementById('welcomeAudio');
  if(el){getAC().resume();el.volume=1;el.currentTime=0;el.play().catch(()=>{});}
}

function playStartJingle(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playBeep(f,0.15,0.5),i*120));
}

// ---- DRAW LAMBO ----
function drawLambo(x,y,w,h,isPlayer){
  ctx.save();ctx.translate(x,y);
  const purple=isPlayer?'#9333ea':'#dc2626',dark=isPlayer?'#6b21a8':'#991b1b';
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(0,h/2-4,w*0.44,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=purple;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,[4,4,6,6]);ctx.fill();
  ctx.fillStyle=dark;ctx.beginPath();ctx.roundRect(-w/2+6,-h/2,w-12,h*0.42,[4,4,2,2]);ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.5)';ctx.beginPath();ctx.roundRect(-w/2+9,-h/2+4,w-18,h*0.22,3);ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.35)';ctx.beginPath();ctx.roundRect(-w/2+9,-h/2+h*0.28,w-18,h*0.12,2);ctx.fill();
  ctx.fillStyle='#fef08a';ctx.fillRect(-w/2+4,-h/2,10,5);ctx.fillRect(w/2-14,-h/2,10,5);
  ctx.fillStyle='#f87171';ctx.fillRect(-w/2+4,h/2-5,10,5);ctx.fillRect(w/2-14,h/2-5,10,5);
  ctx.fillStyle='#1f2937';
  ctx.fillRect(-w/2-6+2,-h/2+10,10,18);ctx.fillRect(w/2-2,-h/2+10,10,18);
  ctx.fillRect(-w/2-6+2,h/2-28,10,18);ctx.fillRect(w/2-2,h/2-28,10,18);
  ctx.fillStyle='#d1d5db';
  ctx.fillRect(-w/2-6+4,-h/2+13,6,12);ctx.fillRect(w/2,-h/2+13,6,12);
  ctx.fillRect(-w/2-6+4,h/2-25,6,12);ctx.fillRect(w/2,h/2-25,6,12);
  if(isPlayer){
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(-w/2+2,-h/2+h*0.45,w-4,9);
    ctx.fillStyle='#fff';ctx.font='bold '+Math.floor(w*0.22)+'px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('KAAN',0,-h/2+h*0.495);
  }
  ctx.restore();
}

function drawRoad(){
  ctx.fillStyle='#374151';ctx.fillRect(RL,0,RW,H);
  ctx.fillStyle='#1f2937';ctx.fillRect(0,0,RL,H);ctx.fillRect(RR,0,W-RR,H);
  for(let i=0;i<H;i+=40){
    ctx.fillStyle=(Math.floor((i+frame*speed*0.5)/40)%2===0)?'#ef4444':'#fff';
    ctx.fillRect(RL-20,i,20,20);ctx.fillRect(RR,i,20,20);
  }
  ctx.strokeStyle='#fff';ctx.setLineDash([30,20]);ctx.lineWidth=2;
  marks.forEach(m=>{
    ctx.beginPath();ctx.moveTo(RL+LW,m.y);ctx.lineTo(RL+LW,m.y+60);ctx.stroke();
    ctx.beginPath();ctx.moveTo(RL+LW*2,m.y);ctx.lineTo(RL+LW*2,m.y+60);ctx.stroke();
  });
  ctx.setLineDash([]);
}

function spawnOb(){
  const lane=Math.floor(Math.random()*3);
  obstacles.push({x:RL+lane*LW+LW/2,y:-100,w:44,h:80});
}

function collides(a,b){return Math.abs(a.x-b.x)<(a.w/2+b.w/2-6)&&Math.abs(a.y-b.y)<(a.h/2+b.h/2-10);}

function spawnParticles(x,y){
  for(let i=0;i<35;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*7;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:3+Math.random()*5,color:['#9333ea','#f97316','#fbbf24','#fff','#ef4444'][Math.floor(Math.random()*5)]});
  }
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){if(state!=='playing')startGame();e.preventDefault();}
  if(e.code==='ArrowLeft'||e.code==='ArrowRight')e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);
let tX=0;
c.addEventListener('touchstart',e=>{tX=e.touches[0].clientX;getAC().resume();});
c.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tX;
  if(state!=='playing'){startGame();return;}
  if(dx<-30){car.lane=Math.max(0,car.lane-1);targetX=RL+car.lane*LW+LW/2;}
  if(dx>30){car.lane=Math.min(2,car.lane+1);targetX=RL+car.lane*LW+LW/2;}
});

let welcomePlayed=false;
function startGame(){
  getAC().resume();
  state='playing';score=0;speed=4;frame=0;obstacles=[];particles=[];obTimer=0;
  car.lane=1;car.x=W/2;targetX=W/2;
  document.getElementById('msg').textContent='← → to steer';
  startEngine();
  playStartJingle();
  if(!welcomePlayed){welcomePlayed=true;setTimeout(()=>playWelcome(),600);}
}

let nearMissTimer=0;
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  drawRoad();

  if(state==='playing'){
    frame++;score++;
    speed=4+Math.floor(score/300)*0.5;
    updateEngine(speed);
    document.getElementById('score').textContent='SCORE: '+score;
    marks.forEach(m=>{m.y+=speed;if(m.y>H+90)m.y-=8*90;});
    if(keys['ArrowLeft']){car.lane=Math.max(0,car.lane-0.06);targetX=RL+car.lane*LW+LW/2;}
    if(keys['ArrowRight']){car.lane=Math.min(2,car.lane+0.06);targetX=RL+car.lane*LW+LW/2;}
    car.x+=(targetX-car.x)*0.15;
    obTimer++;
    if(obTimer>Math.max(40,90-Math.floor(score/200)*5)){spawnOb();obTimer=0;}
    obstacles.forEach(o=>o.y+=speed*1.2);
    // Near miss beep
    nearMissTimer++;
    if(nearMissTimer>5){
      obstacles.forEach(o=>{
        if(Math.abs(car.x-o.x)<(car.w/2+o.w/2+15)&&Math.abs(car.y-o.y)<(car.h/2+o.h/2+20)&&!collides(car,o))playNearMiss();
      });
      nearMissTimer=0;
    }
    obstacles=obstacles.filter(o=>o.y<H+120);
    obstacles.forEach(o=>{
      if(collides(car,o)){
        spawnParticles(car.x,car.y);
        playCrash();stopEngine();
        state='dead';
        document.getElementById('msg').textContent='GAME OVER! SPACE to retry';
      }
    });
  }

  obstacles.forEach(o=>drawLambo(o.x,o.y,o.w,o.h,false));
  if(state!=='dead')drawLambo(car.x,car.y,car.w,car.h,true);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.03;p.vy+=0.15;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);

  if(state==='waiting'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#a855f7';ctx.font='bold 38px Arial';ctx.textAlign='center';
    ctx.fillText('KAAN RACER 🏎️',W/2,H/2-40);
    ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText('Press SPACE to start',W/2,H/2+10);
    ctx.fillStyle='#9ca3af';ctx.font='14px Arial';ctx.fillText('← → arrow keys to steer',W/2,H/2+40);
  }
  if(state==='dead'&&particles.length===0){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ef4444';ctx.font='bold 40px Arial';ctx.textAlign='center';ctx.fillText('CRASH! 💥',W/2,H/2-50);
    ctx.fillStyle='#fff';ctx.font='24px Arial';ctx.fillText('Score: '+score,W/2,H/2);
    ctx.fillStyle='#a855f7';ctx.font='18px Arial';ctx.fillText('SPACE to play again',W/2,H/2+40);
  }
}
loop();
</script>
</body>
</html>
